services:
  # Production Service
  - type: web
    name: autonomos-platform
    runtime: python
    plan: starter
    branch: dev
    buildCommand: pip install -r requirements.txt && pip install -e . && cd frontend && npm ci && npm run build && cd ..
    startCommand: bash start.sh
    envVars:
      - key: PORT
        value: 10000
      - key: REDIS_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: AOD_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ALLOWED_WEB_ORIGIN
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: AOD_BASE_URL
        value: https://aodv3-1.onrender.com
      - key: AAM_BASE_URL
        value: https://aos-aam.onrender.com
      - key: DCL_V2_BASE_URL
        value: https://aos-dclv2.onrender.com
      - key: DCL_BASE_URL
        value: https://aos-dclv2.onrender.com
    healthCheckPath: /
    autoDeploy: true
